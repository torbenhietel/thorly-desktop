name: Build + Release Tauri App

# Trigger:
#  - Tag-Push v*: erzeugt vollen Release mit Binaries fuer alle 3 OS
#  - Manuell via workflow_dispatch (dann ohne Release-Publish)
#
# Voraussetzungen (GitHub-Secrets):
#  - TAURI_SIGNING_PRIVATE_KEY     (von `bun run tauri signer generate`)
#  - TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#
# Beide Secrets sind fuer den Updater zwingend, NICHT fuer Code-Signing
# der Binary selbst (das machen wir vorerst nicht — siehe README).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install JS dependencies
        run: bun install

      - name: Build + Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'doneby ${{ github.ref_name }}'
          releaseBody: |
            doneby Desktop-App.

            **Beta — unsigned**: Beim ersten Start zeigt Windows/macOS einmalig eine Sicherheits-Warnung. Einmal "Trotzdem ausführen" / "Öffnen" klicken, danach läuft alles normal.

            Auto-Update: aktiv. Künftige Versionen kommen automatisch.

            Installation: https://doneby.io/desktop
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
